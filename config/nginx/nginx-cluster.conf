# jz-wxbot 多实例负载均衡配置
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 4096;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format json_combined escape=json '{"time":"$time_iso8601","remote_addr":"$remote_addr","request":"$request","status":"$status","upstream":"$upstream_addr","instance":"$upstream_http_x_instance_id"}';
    access_log /var/log/nginx/access.log json_combined;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    upstream wxbot_cluster {
        least_conn;
        server wxbot-1:8080 weight=5 max_fails=3 fail_timeout=30s;
        server wxbot-2:8080 weight=5 max_fails=3 fail_timeout=30s;
        server wxbot-3:8080 weight=5 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    upstream wxbot_ws {
        ip_hash;
        server wxbot-1:8080;
        server wxbot-2:8080;
        server wxbot-3:8080;
    }

    server {
        listen 80;
        server_name _;

        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        location /ws {
            proxy_pass http://wxbot_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
        }

        location / {
            limit_req zone=api_limit burst=100 nodelay;
            limit_conn conn_limit 50;
            proxy_pass http://wxbot_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }

        location /metrics {
            proxy_pass http://wxbot_cluster/metrics;
            access_log off;
        }
    }
}