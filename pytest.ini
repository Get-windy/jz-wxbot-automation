[pytest]
# Pytest configuration for jz-wxbot automation tests

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Register custom markers
markers =
    message: Message-related tests
    text: Text message tests
    media: Media message tests
    group: Group-related tests
    receive: Message receiving tests
    filter: Message filtering tests
    forward: Message forwarding tests
    member: Member management tests
    boundary: Boundary condition tests
    exception: Exception handling tests
    performance: Performance tests
    security: Security-related tests
    sql_injection: SQL injection tests
    xss: XSS attack tests
    auth: Authentication tests
    csrf: CSRF protection tests
    data_leakage: Data leakage tests
    input_validation: Input validation tests
    headers: HTTP headers tests
    stability: Stability tests
    reliability: Reliability tests
    integration: Integration tests
    unit: Unit tests
    functional: Core functionality tests
    send: Message sending tests
    reply: Auto-reply tests
    bridge: Bridge service tests

# Test paths
testpaths = tests

# Output options
addopts = -v --tb=short --strict-markers

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Logging
log_cli = false
log_cli_level = INFO

# Asyncio mode
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function